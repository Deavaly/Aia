<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>AIA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style>
    :root { --accent: #8b5cf6; }
    body, html { margin: 0; padding: 0; height: 100%; background: #000; color: #fff; font-family: -apple-system, system-ui, sans-serif; overflow: hidden; }
    
    /* Живой фон для прозрачности */
    .bg-blobs { position: fixed; width: 100%; height: 100%; z-index: -1; overflow: hidden; background: #050508; }
    .blob { position: absolute; width: 300px; height: 300px; background: var(--accent); filter: blur(100px); opacity: 0.15; border-radius: 50%; animation: move 20s infinite alternate; }
    @keyframes move { from { transform: translate(-10%, -10%); } to { transform: translate(100%, 50%); } }

    .app { display: flex; flex-direction: column; height: 100dvh; }
    
    .header {
      padding: env(safe-area-inset-top) 20px 15px;
      display: flex; justify-content: space-between; align-items: center;
      background: rgba(10, 10, 15, 0.4); 
      backdrop-filter: blur(30px) saturate(150%); -webkit-backdrop-filter: blur(30px) saturate(150%);
      border-bottom: 0.5px solid rgba(255,255,255,0.1);
    }

    .chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
    
    .msg { max-width: 80%; padding: 12px 16px; border-radius: 20px; font-size: 16px; line-height: 1.4; }
    .user { align-self: flex-end; background: var(--accent); border-bottom-right-radius: 4px; }
    
    .aia { 
      align-self: flex-start; 
      background: rgba(255, 255, 255, 0.07); 
      backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
      border: 0.5px solid rgba(255,255,255,0.1); 
      border-bottom-left-radius: 4px; 
    }

    .input-area {
      padding: 15px 15px calc(30px + env(safe-area-inset-bottom));
      background: rgba(10, 10, 15, 0.4);
      backdrop-filter: blur(30px) saturate(150%); -webkit-backdrop-filter: blur(30px) saturate(150%);
      border-top: 0.5px solid rgba(255,255,255,0.1);
    }

    .input-row { display: flex; gap: 10px; background: rgba(255,255,255,0.08); padding: 8px 8px 8px 16px; border-radius: 25px; }
    input { flex: 1; background: none; border: none; color: #fff; font-size: 16px; outline: none; }
    .btn { width: 38px; height: 38px; border-radius: 50%; background: #fff; border: none; color: #000; font-size: 20px; font-weight: bold; }
  </style>
</head>
<body>
  <div class="bg-blobs"><div class="blob"></div><div class="blob" style="animation-delay:-10s; right:0; background:#4f46e5;"></div></div>
  <div class="app">
    <div class="header">
      <div style="font-weight:700; font-size:20px;">Айя</div>
      <button onclick="localStorage.clear(); location.reload();" style="background:none; border:none; color:rgba(255,255,255,0.3);">Очистить</button>
    </div>
    <div class="chat" id="box"></div>
    <div class="input-area">
      <div class="input-row">
        <input type="text" id="ui" placeholder="Напиши Айе..." onkeypress="if(event.key==='Enter')send()">
        <button id="btn" class="btn" onclick="send()">↑</button>
      </div>
    </div>
  </div>
  <script>
    const box = document.getElementById('box');
    const ui = document.getElementById('ui');
    let h = JSON.parse(localStorage.getItem('aia_v4') || '[]');
    function add(r, t) {
      const d = document.createElement('div'); d.className = `msg ${r==='user'?'user':'aia'}`;
      d.textContent = t; box.appendChild(d); box.scrollTop = box.scrollHeight;
    }
    h.forEach(m => add(m.role, m.content));
    if(!h.length) add('aia', 'Я здесь, Олег.');
    async function send() {
      const v = ui.value.trim(); if(!v) return;
      ui.value = ''; add('user', v); h.push({role:'user', content:v});
      const res = await fetch('/api/chat', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({messages:h.slice(-10)}) });
      const d = await res.json();
      if(d.reply) { add('aia', d.reply); h.push({role:'assistant', content:d.reply}); localStorage.setItem('aia_v4', JSON.stringify(h)); }
    }
  </script>
</body>
</html>
