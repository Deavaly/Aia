<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>AIA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style>
    :root { --accent: #8b5cf6; }
    body, html { 
      margin: 0; padding: 0; height: 100dvh; 
      background: #000; color: #fff; 
      font-family: -apple-system, system-ui, sans-serif; 
      overflow: hidden;
    }
    
    /* Фон с яркими пятнами, которые будут просвечивать через блюр */
    .bg {
      position: fixed; inset: 0; z-index: -1;
      background: linear-gradient(135deg, #0f172a 0%, #000000 100%);
    }
    .blob {
      position: absolute; width: 300px; height: 300px; 
      border-radius: 50%; filter: blur(70px); opacity: 0.3;
    }

    .app { display: flex; flex-direction: column; height: 100dvh; }

    /* ЭФФЕКТ СТЕКЛА ДЛЯ SAFARI */
    .header, .input-area {
      background: rgba(20, 20, 25, 0.4);
      backdrop-filter: blur(25px) saturate(180%);
      -webkit-backdrop-filter: blur(25px) saturate(180%);
      border-bottom: 0.5px solid rgba(255,255,255,0.1);
      z-index: 10;
    }
    .header { padding: env(safe-area-inset-top) 20px 15px; display: flex; justify-content: space-between; align-items: center; }
    
    .chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
    
    /* Стеклянные баблы Айи */
    .msg { max-width: 80%; padding: 12px 16px; border-radius: 20px; font-size: 16px; line-height: 1.4; }
    .user { align-self: flex-end; background: var(--accent); }
    .aia { 
      align-self: flex-start; 
      background: rgba(255, 255, 255, 0.08); 
      border: 0.5px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    }

    .input-area {
      padding: 15px 15px calc(30px + env(safe-area-inset-bottom));
      border-top: 0.5px solid rgba(255,255,255,0.1);
      border-bottom: none;
    }
    .input-row { display: flex; gap: 10px; background: rgba(255,255,255,0.1); padding: 8px 16px; border-radius: 25px; }
    input { flex: 1; background: none; border: none; color: #fff; font-size: 16px; outline: none; padding: 5px 0; }
    .btn { width: 36px; height: 36px; border-radius: 50%; background: #fff; border: none; color: #000; font-size: 18px; font-weight: bold; }
  </style>
</head>
<body>
  <div class="bg">
    <div class="blob" style="top: -50px; left: -50px; background: #4f46e5;"></div>
    <div class="blob" style="bottom: 10%; right: -50px; background: #7c3aed;"></div>
  </div>
  <div class="app">
    <div class="header">
      <div style="font-weight:700; font-size:20px; letter-spacing:-0.5px;">Айя</div>
      <button onclick="localStorage.clear(); location.reload();" style="background:none; border:none; color:rgba(255,255,255,0.4);">Очистить</button>
    </div>
    <div class="chat" id="box"></div>
    <div class="input-area">
      <div class="input-row">
        <input type="text" id="ui" placeholder="Напиши Айе..." onkeypress="if(event.key==='Enter')send()">
        <button id="btn" class="btn" onclick="send()">↑</button>
      </div>
    </div>
  </div>
  <script>
    const box = document.getElementById('box');
    const ui = document.getElementById('ui');
    let h = JSON.parse(localStorage.getItem('aia_vfinal') || '[]');
    function add(r, t) {
      const d = document.createElement('div'); d.className = `msg ${r==='user'?'user':'aia'}`;
      d.textContent = t; box.appendChild(d); box.scrollTop = box.scrollHeight;
    }
    h.forEach(m => add(m.role, m.content));
    async function send() {
      const v = ui.value.trim(); if(!v) return;
      ui.value = ''; add('user', v); h.push({role:'user', content:v});
      try {
        const res = await fetch('/api/chat', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({messages:h.slice(-10)}) });
        const d = await res.json();
        if(d.reply) { add('aia', d.reply); h.push({role:'assistant', content:d.reply}); localStorage.setItem('aia_vfinal', JSON.stringify(h)); }
      } catch(e) { add('aia', 'Связь пропала...'); }
    }
  </script>
</body>
</html>
