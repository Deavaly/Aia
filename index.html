<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>AIA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/IMG_3917.jpeg">

  <style>
    :root {
      --bg: #08080c;
      --accent: #a855f7;
      --text: #ffffff;
      --glass: rgba(255, 255, 255, 0.06);
      --glass-border: rgba(255, 255, 255, 0.12);
    }
    * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
    body, html { 
      margin: 0; padding: 0; height: 100%; 
      background: var(--bg); color: var(--text);
      font-family: -apple-system, system-ui, sans-serif;
      overflow: hidden;
    }
    .app {
      display: flex; flex-direction: column; height: 100dvh;
      background: 
        radial-gradient(ellipse at 50% -10%, rgba(139, 92, 246, 0.15), transparent 60%),
        radial-gradient(ellipse at 50% 110%, rgba(139, 92, 246, 0.08), transparent 50%),
        var(--bg);
    }

    /* ─── Header ─── */
    .header {
      padding: env(safe-area-inset-top) 20px 15px;
      display: flex; justify-content: space-between; align-items: center;
      background: rgba(20, 20, 30, 0.6);
      backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
      border-bottom: 0.5px solid var(--glass-border);
      z-index: 10;
    }
    .status-group { display: flex; flex-direction: column; }
    .name { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
    .status { font-size: 11px; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }

    /* ─── Chat ─── */
    .chat {
      flex: 1; overflow-y: auto; padding: 20px;
      display: flex; flex-direction: column; gap: 16px;
      scroll-behavior: smooth;
      /* Мягкие светлые края сверху и снизу */
      mask-image: linear-gradient(to bottom, transparent, black 30px, black calc(100% - 30px), transparent);
      -webkit-mask-image: linear-gradient(to bottom, transparent, black 30px, black calc(100% - 30px), transparent);
    }

    /* ─── Messages ─── */
    .msg {
      max-width: 85%; padding: 14px 18px; border-radius: 22px;
      font-size: 17px; line-height: 1.4; position: relative;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { 
      from { opacity: 0; transform: translateY(10px); } 
      to { opacity: 1; transform: translateY(0); } 
    }

    /* Сообщения пользователя — стеклянный фиолетовый */
    .user {
      align-self: flex-end;
      background: rgba(168, 85, 247, 0.25);
      backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
      border: 0.5px solid rgba(168, 85, 247, 0.35);
      border-bottom-right-radius: 4px;
      color: white;
      box-shadow: 
        0 4px 20px rgba(168, 85, 247, 0.15),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    /* Сообщения Айи — стеклянный белый */
    .aia {
      align-self: flex-start;
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
      border: 0.5px solid rgba(255, 255, 255, 0.13);
      border-bottom-left-radius: 4px;
      box-shadow: 
        0 4px 20px rgba(0, 0, 0, 0.2),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    /* ─── Input ─── */
    .input-area {
      padding: 15px 15px calc(15px + env(safe-area-inset-bottom));
      background: rgba(20, 20, 30, 0.6);
      backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
      border-top: 0.5px solid var(--glass-border);
    }
    .input-row {
      display: flex; gap: 10px;
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      padding: 8px 8px 8px 16px; border-radius: 25px;
      border: 0.5px solid var(--glass-border);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
    }
    input {
      flex: 1; background: none; border: none; color: white;
      font-size: 17px; outline: none;
    }
    input::placeholder { color: rgba(255, 255, 255, 0.3); }
    .send-btn {
      width: 38px; height: 38px; border-radius: 50%;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      border: none; color: black;
      font-size: 20px; font-weight: bold;
      transition: opacity 0.2s;
    }
    .send-btn:disabled { opacity: 0.3; }
    .send-btn:active { transform: scale(0.92); }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="status-group">
        <span class="name">Айя</span>
        <span id="st" class="status">В сети</span>
      </div>
      <button onclick="clearChat()" style="background:none; border:none; color:rgba(255,255,255,0.4); font-size:13px;">Очистить</button>
    </div>
    
    <div class="chat" id="box"></div>

    <div class="input-area">
      <div class="input-row">
        <input type="text" id="ui" placeholder="Начни историю..." onkeypress="if(event.key==='Enter')send()">
        <button id="btn" class="send-btn" onclick="send()">↑</button>
      </div>
    </div>
  </div>

  <script>
    const box = document.getElementById('box');
    const ui = document.getElementById('ui');
    const st = document.getElementById('st');
    let h = JSON.parse(localStorage.getItem('aia_v2') || '[]');

    function add(role, txt) {
      const div = document.createElement('div');
      div.className = `msg ${role==='user'?'user':'aia'}`;
      div.textContent = txt;
      box.appendChild(div);
      box.scrollTop = box.scrollHeight;
    }

    h.forEach(m => add(m.role, m.content));
    if(!h.length) add('aia', 'Я здесь. Спрашивай о чем угодно, я не кусаюсь... почти.');

    async function send() {
      const v = ui.value.trim(); if(!v) return;
      ui.value = ''; add('user', v);
      h.push({role:'user', content:v});
      st.textContent = 'Айя думает...';
      
      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({messages: h.slice(-10)})
        });
        const d = await res.json();
        if(d.reply) {
          add('aia', d.reply);
          h.push({role:'assistant', content:d.reply});
          localStorage.setItem('aia_v2', JSON.stringify(h));
        }
      } catch(e) { add('aia', 'Связь прервалась...'); }
      st.textContent = 'В сети';
    }

    function clearChat() {
      localStorage.removeItem('aia_v2');
      location.reload();
    }
  </script>
</body>
</html>
