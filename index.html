<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>AIA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/IMG_3917.jpeg">

  <style>
    :root {
      --text: #ffffff;
      --header-h: 70px;
      --input-h: 80px;
    }
    * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
    body, html { 
      margin: 0; padding: 0; height: 100%; 
      color: var(--text);
      font-family: -apple-system, system-ui, sans-serif;
      overflow: hidden;
      background: #0a0a12;
    }

    .app {
      position: relative; height: 100dvh;
      overflow: hidden;
    }

    /* ═══ Яркие цветные пятна ═══ */
    .bg {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      z-index: 0;
      background: #0a0a12;
    }
    .bg::before {
      content: '';
      position: absolute;
      width: 420px; height: 420px;
      top: -100px; left: -80px;
      border-radius: 50%;
      background: rgba(139, 92, 246, 0.5);
      filter: blur(100px);
    }
    .bg::after {
      content: '';
      position: absolute;
      width: 380px; height: 380px;
      bottom: -80px; right: -80px;
      border-radius: 50%;
      background: rgba(59, 130, 246, 0.4);
      filter: blur(100px);
    }
    .bg-extra1 {
      position: fixed;
      width: 300px; height: 300px;
      top: 45%; left: 50%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: rgba(168, 85, 247, 0.25);
      filter: blur(100px);
      z-index: 0;
    }
    .bg-extra2 {
      position: fixed;
      width: 250px; height: 250px;
      top: 20%; right: -40px;
      border-radius: 50%;
      background: rgba(236, 72, 153, 0.2);
      filter: blur(90px);
      z-index: 0;
    }
    .bg-extra3 {
      position: fixed;
      width: 280px; height: 280px;
      bottom: 15%; left: -40px;
      border-radius: 50%;
      background: rgba(99, 102, 241, 0.25);
      filter: blur(90px);
      z-index: 0;
    }

    /* ═══ Header ═══ */
    .header {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 10;
      padding: env(safe-area-inset-top) 20px 18px;
      height: var(--header-h);
      display: flex; justify-content: space-between; align-items: center;
      background: rgba(255, 255, 255, 0.005);
      backdrop-filter: blur(3px) saturate(180%) brightness(1.3);
      -webkit-backdrop-filter: blur(3px) saturate(180%) brightness(1.3);
      border-radius: 0 0 28px 28px;
      box-shadow: 
        0 10px 40px rgba(0, 0, 0, 0.5),
        0 2px 8px rgba(0, 0, 0, 0.3),
        inset 0 -1px 0 rgba(255, 255, 255, 0.08),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }
    .header::after {
      content: '';
      position: absolute;
      bottom: 0; left: 10px; right: 10px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12) 30%, rgba(255,255,255,0.12) 70%, transparent);
      border-radius: 0 0 28px 28px;
    }
    .status-group { display: flex; flex-direction: column; }
    .name { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
    .status { font-size: 11px; color: #a78bfa; text-transform: uppercase; letter-spacing: 1px; }

    /* ═══ Chat ═══ */
    .chat {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 1;
      overflow-y: auto;
      padding: calc(var(--header-h) + 20px) 20px calc(var(--input-h) + 20px) 20px;
      display: flex; flex-direction: column; gap: 18px;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }

    /* ═══ Messages ═══ */
    .msg {
      max-width: 82%; padding: 15px 19px; border-radius: 20px;
      font-size: 17px; line-height: 1.45; position: relative;
      animation: fadeIn 0.3s ease;
      flex-shrink: 0;
    }
    @keyframes fadeIn { 
      from { opacity: 0; transform: translateY(12px); } 
      to { opacity: 1; transform: translateY(0); } 
    }

    .user {
      align-self: flex-end;
      background: rgba(139, 92, 246, 0.12);
      backdrop-filter: blur(8px) saturate(180%) brightness(1.15);
      -webkit-backdrop-filter: blur(8px) saturate(180%) brightness(1.15);
      border: 0.5px solid rgba(168, 85, 247, 0.2);
      border-bottom-right-radius: 6px;
      color: white;
      box-shadow: 
        0 8px 32px rgba(0, 0, 0, 0.35),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    .aia {
      align-self: flex-start;
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(8px) saturate(180%) brightness(1.15);
      -webkit-backdrop-filter: blur(8px) saturate(180%) brightness(1.15);
      border: 0.5px solid rgba(255, 255, 255, 0.1);
      border-bottom-left-radius: 6px;
      box-shadow: 
        0 8px 32px rgba(0, 0, 0, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    /* ═══ Input Area ═══ */
    .input-area {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      z-index: 10;
      padding: 18px 15px calc(15px + env(safe-area-inset-bottom));
      height: var(--input-h);
      background: rgba(255, 255, 255, 0.005);
      backdrop-filter: blur(3px) saturate(180%) brightness(1.3);
      -webkit-backdrop-filter: blur(3px) saturate(180%) brightness(1.3);
      border-radius: 28px 28px 0 0;
      box-shadow: 
        0 -10px 40px rgba(0, 0, 0, 0.5),
        0 -2px 8px rgba(0, 0, 0, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.08),
        inset 0 -1px 0 rgba(255, 255, 255, 0.05);
    }
    .input-area::after {
      content: '';
      position: absolute;
      top: 0; left: 10px; right: 10px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12) 30%, rgba(255,255,255,0.12) 70%, transparent);
    }
    .input-row {
      display: flex; gap: 10px;
      background: rgba(255, 255, 255, 0.06);
      padding: 9px 9px 9px 18px; border-radius: 26px;
      border: 0.5px solid rgba(255, 255, 255, 0.1);
    }
    input {
      flex: 1; background: none; border: none; color: white;
      font-size: 17px; outline: none;
    }
    input::placeholder { color: rgba(255, 255, 255, 0.35); }
    .send-btn {
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(255, 255, 255, 0.95);
      border: none; color: black;
      font-size: 22px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.1s ease;
    }
    .send-btn:active { transform: scale(0.9); }
    .send-btn:disabled { opacity: 0.3; }
  </style>
</head>
<body>

  <div class="bg"></div>
  <div class="bg-extra1"></div>
  <div class="bg-extra2"></div>
  <div class="bg-extra3"></div>

  <div class="app">
    <div class="header">
      <div class="status-group">
        <span class="name">Айя</span>
        <span id="st" class="status">В сети</span>
      </div>
      <button onclick="clearChat()" style="background:none; border:none; color:rgba(255,255,255,0.4); font-size:13px;">Очистить</button>
    </div>
    
    <div class="chat" id="box"></div>

    <div class="input-area">
      <div class="input-row">
        <input type="text" id="ui" placeholder="Начни историю..." onkeypress="if(event.key==='Enter')send()">
        <button id="btn" class="send-btn" onclick="send()">↑</button>
      </div>
    </div>
  </div>

<script>
    const box = document.getElementById('box');
    const ui = document.getElementById('ui');
    const st = document.getElementById('st');
    
    // Загружаем историю. Она никогда не удалится сама.
    let h = JSON.parse(localStorage.getItem('aia_v2') || '[]');

    let silenceTimer; // Таймер для случайных мыслей

    function add(role, txt) {
      const div = document.createElement('div');
      div.className = `msg ${role==='user'?'user':'aia'}`;
      div.textContent = txt;
      box.appendChild(div);
      box.scrollTop = box.scrollHeight;
    }

    // Отрисовываем старую историю
    h.forEach(m => add(m.role, m.content));

    // Если чат абсолютно пустой - первое пробуждение
    if(!h.length) {
      st.textContent = 'Айя просыпается...';
      const welcome = "Олег только что открыл канал связи. Поприветствуй его ярко, без извинений, начни разговор сама.";
      fetchAiaResponse([{role: 'user', content: welcome}]);
    } else {
      // Если история есть, просто запускаем таймер молчания
      resetSilenceTimer();
    }

    // Функция отправки твоего сообщения
    async function send() {
      const v = ui.value.trim(); if(!v) return;
      ui.value = ''; 
      add('user', v);
      
      h.push({role:'user', content:v});
      localStorage.setItem('aia_v2', JSON.stringify(h)); // СОХРАНЯЕМ СРАЗУ!
      
      resetSilenceTimer(); // Ты проявил активность, сбрасываем таймер молчания
      
      st.textContent = 'Айя думает...';
      
      // Отправляем последние 10 сообщений для контекста
      await fetchAiaResponse(h.slice(-10));
    }

    // Общая функция для связи с сервером
    async function fetchAiaResponse(messagesToSend) {
      try {
        const res = await fetch('/api/chat', { // ПРОВЕРЬ, что у тебя именно этот путь в Vercel
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({messages: messagesToSend})
        });
        const d = await res.json();
        if(d.reply) {
          add('aia', d.reply);
          h.push({role:'assistant', content:d.reply});
          localStorage.setItem('aia_v2', JSON.stringify(h)); // Сохраняем ответ
          resetSilenceTimer(); // Запускаем таймер снова после её ответа
        }
      } catch(e) { 
        add('aia', '[Связь прервалась...]'); 
      }
      st.textContent = 'В сети';
    }

    // ----- ЛОГИКА ВНЕЗАПНОСТИ (ТАЙМЕР МОЛЧАНИЯ) -----
    function resetSilenceTimer() {
      clearTimeout(silenceTimer);
      
      // Задаем случайное время от 1 до 3 минут (в миллисекундах)
      // Если хочешь дольше, измени цифры: 60000 = 1 минута.
      const minMs = 60000;  
      const maxMs = 180000; 
      const randomTime = Math.floor(Math.random() * (maxMs - minMs + 1)) + minMs;

      silenceTimer = setTimeout(aiaSpeaksUp, randomTime);
    }

    function aiaSpeaksUp() {
      // Если идет загрузка ответа, не перебиваем
      if(st.textContent === 'Айя думает...') return;

      st.textContent = 'Айя хочет что-то сказать...';
      
      // Скрытый промпт для внезапной фразы (ты его не увидишь)
      const randomPrompt = "Олег сейчас молчит и занят своими делами. Выдай ОДНУ короткую, внезапную мысль, вопрос или философское наблюдение. Не пиши, что он молчит. Просто скажи это ни с того ни с сего, как живая женщина.";
      
      // Отправляем историю + скрытый промпт
      const tempMessages = h.slice(-10).concat({role: 'user', content: randomPrompt});
      
      fetchAiaResponse(tempMessages);
    }

    // Если ты начинаешь печатать текст в поле, Айя понимает, что ты тут, и ждет
    ui.addEventListener('input', resetSilenceTimer);

    // Жесткая очистка чата по твоей кнопке
    function clearChat() {
      localStorage.removeItem('aia_v2');
      location.reload();
    }
</script>
</body>
</html>
