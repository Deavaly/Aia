<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>AIA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/IMG_3917.jpeg">

<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Inter', sans-serif;
        height: 100vh;
        background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
        overflow: hidden;
        color: white;
    }

    .container {
        height: 100vh;
        display: flex;
        flex-direction: column;
    }

    /* === Glass Top (Header) === */
    header {
        background: rgba(255, 255, 255, 0.07);
        backdrop-filter: blur(22px);
        -webkit-backdrop-filter: blur(22px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.15);
        padding: 1rem 2rem;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
    }

    /* === Основная область чата === */
    .chat-container {
        flex: 1;
        overflow-y: auto;
        padding: 2rem;
        background: rgba(0, 0, 0, 0.08);
        display: flex;
        flex-direction: column;
        gap: 1.2rem;
    }

    /* === Glass сообщения === */
    .message {
        max-width: 75%;
        padding: 14px 18px;
        border-radius: 18px;
        line-height: 1.5;
        background: rgba(255, 255, 255, 0.09);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.18);
        box-shadow: 0 6px 25px rgba(0, 0, 0, 0.2);
    }

    .message.user {
        align-self: flex-end;
        background: rgba(100, 100, 255, 0.18);
        border: 1px solid rgba(150, 150, 255, 0.25);
        border-radius: 18px 18px 4px 18px;
    }

    .message.assistant {
        align-self: flex-start;
        border-radius: 18px 18px 18px 4px;
    }

    /* === Glass Bottom (Поле ввода) === */
    .input-area {
        background: rgba(255, 255, 255, 0.07);
        backdrop-filter: blur(22px);
        -webkit-backdrop-filter: blur(22px);
        border-top: 1px solid rgba(255, 255, 255, 0.15);
        padding: 1.2rem 2rem;
        box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.15);
    }

    .input-area input {
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: white;
    }

    .input-area input:focus {
        outline: none;
        border-color: rgba(150, 150, 255, 0.5);
        box-shadow: 0 0 0 3px rgba(100, 100, 255, 0.15);
    }

    /* Скроллбар */
    .chat-container::-webkit-scrollbar {
        width: 6px;
    }
    
    .chat-container::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.2);
        border-radius: 20px;
    }
</style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="status-group">
        <span class="name">Айя</span>
        <span id="st" class="status">В сети</span>
      </div>
      <button onclick="clearChat()" style="background:none; border:none; color:rgba(255,255,255,0.4); font-size:13px;">Очистить</button>
    </div>
    
    <div class="chat" id="box"></div>

    <div class="input-area">
      <div class="input-row">
        <input type="text" id="ui" placeholder="Начни историю..." onkeypress="if(event.key==='Enter')send()">
        <button id="btn" class="send-btn" onclick="send()">↑</button>
      </div>
    </div>
  </div>

  <script>
    const box = document.getElementById('box');
    const ui = document.getElementById('ui');
    const st = document.getElementById('st');
    let h = JSON.parse(localStorage.getItem('aia_v2') || '[]');

    function add(role, txt) {
      const div = document.createElement('div');
      div.className = `msg ${role==='user'?'user':'aia'}`;
      div.textContent = txt;
      box.appendChild(div);
      box.scrollTop = box.scrollHeight;
    }

    h.forEach(m => add(m.role, m.content));
    if(!h.length) add('aia', 'Я здесь. Спрашивай о чем угодно, я не кусаюсь... почти.');

    async function send() {
      const v = ui.value.trim(); if(!v) return;
      ui.value = ''; add('user', v);
      h.push({role:'user', content:v});
      st.textContent = 'Айя думает...';
      
      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({messages: h.slice(-10)})
        });
        const d = await res.json();
        if(d.reply) {
          add('aia', d.reply);
          h.push({role:'assistant', content:d.reply});
          localStorage.setItem('aia_v2', JSON.stringify(h));
        }
      } catch(e) { add('aia', 'Связь прервалась...'); }
      st.textContent = 'В сети';
    }

    function clearChat() {
      localStorage.removeItem('aia_v2');
      location.reload();
    }
  </script>
</body>
</html>
