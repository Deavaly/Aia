<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>AIA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/IMG_3917.jpeg">

  <style>
    :root {
      --bg: #000000;
      --accent: #8b5cf6;
      --glass: rgba(255, 255, 255, 0.08); /* Чуть светлее для видимости */
    }
    body {
      background: var(--bg);
      /* Добавляем живой градиент на фон всей страницы */
      background-image: 
        radial-gradient(circle at 0% 0%, #1e1b4b 0%, transparent 50%),
        radial-gradient(circle at 100% 100%, #2e1065 0%, transparent 50%);
      background-attachment: fixed;
    }
    .header {
      padding: env(safe-area-inset-top) 20px 15px;
      background: rgba(0, 0, 0, 0.5); 
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%); /* Для Safari */
      border-bottom: 0.5px solid rgba(255,255,255,0.1);
      position: sticky; top: 0; z-index: 100;
    }
    .aia {
      align-self: flex-start; 
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 0.5px solid rgba(255,255,255,0.1);
      border-bottom-left-radius: 4px;
    }
    .input-area {
      padding: 10px 15px calc(20px + env(safe-area-inset-bottom));
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-top: 0.5px solid rgba(255,255,255,0.1);
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="status-group">
        <span class="name">Айя</span>
        <span id="st" class="status">В сети</span>
      </div>
      <button onclick="clearChat()" style="background:none; border:none; color:rgba(255,255,255,0.4); font-size:13px;">Очистить</button>
    </div>
    
    <div class="chat" id="box"></div>

    <div class="input-area">
      <div class="input-row">
        <input type="text" id="ui" placeholder="Начни историю..." onkeypress="if(event.key==='Enter')send()">
        <button id="btn" class="send-btn" onclick="send()">↑</button>
      </div>
    </div>
  </div>

    <script>
    const box = document.getElementById('box');
    const ui = document.getElementById('ui');
    const st = document.getElementById('st');
    let h = JSON.parse(localStorage.getItem('aia_v2') || '[]');

    function add(role, txt) {
      const div = document.createElement('div');
      div.className = `msg ${role==='user'?'user':'aia'}`;
      div.textContent = txt;
      box.appendChild(div);
      box.scrollTop = box.scrollHeight;
      return div;
    }

    h.forEach(m => add(m.role, m.content));

    async function send() {
      const v = ui.value.trim(); if(!v) return;
      ui.value = ''; 
      add('user', v);
      h.push({role:'user', content:v});
      
      st.textContent = 'Айя пишет...';
      const aiaDiv = add('aia', '...'); 
      
      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({messages: h.slice(-12)})
        });
        const d = await res.json();
        
        if(d.reply) {
          aiaDiv.textContent = d.reply; // Пока без потока, но быстро
          h.push({role:'assistant', content:d.reply});
          localStorage.setItem('aia_v2', JSON.stringify(h));
        }
      } catch(e) { aiaDiv.textContent = 'Связь прервалась...'; }
      st.textContent = 'В сети';
    }

    function clearChat() {
      if(confirm('Начать с чистого листа?')) {
        localStorage.removeItem('aia_v2');
        location.reload();
      }
    }
  </script>
</body>
</html>
