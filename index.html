<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>AIA</title>

  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0c12" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="AIA" />

  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icon.png" />

  <style>
    :root {
      --bg: #06070b;
      --bg-2: #0a0c12;
      --text: #f5f7ff;
      --muted: #9aa3b2;
      --line: rgba(255, 255, 255, 0.09);
      --glass: rgba(255, 255, 255, 0.07);
      --glass-strong: rgba(10, 12, 18, 0.58);
      --accent: #8b5cf6;
      --accent-2: #4f46e5;
      --danger: #ff6b81;
      --shadow: 0 10px 35px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      overflow: hidden;
    }

    body {
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      background:
        radial-gradient(circle at 15% 15%, rgba(139, 92, 246, 0.24), transparent 28%),
        radial-gradient(circle at 85% 20%, rgba(79, 70, 229, 0.18), transparent 24%),
        radial-gradient(circle at 50% 100%, rgba(168, 85, 247, 0.14), transparent 30%),
        linear-gradient(180deg, #0b0d14 0%, #06070b 100%);
      background-attachment: fixed;
    }

    .app {
      height: 100dvh;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    .topbar {
      padding:
        calc(12px + env(safe-area-inset-top))
        14px
        12px
        14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: var(--glass-strong);
      border-bottom: 1px solid var(--line);
      -webkit-backdrop-filter: blur(22px) saturate(180%);
      backdrop-filter: blur(22px) saturate(180%);
    }

    .brand {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .title {
      font-size: 19px;
      font-weight: 700;
      letter-spacing: -0.2px;
    }

    .status {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .ghost-btn {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      border-radius: 14px;
      padding: 10px 12px;
      font-size: 13px;
      font-weight: 600;
      -webkit-backdrop-filter: blur(12px);
      backdrop-filter: blur(12px);
    }

    .chat {
      overflow-y: auto;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
      overscroll-behavior: contain;
    }

    .msg {
      max-width: 84%;
      padding: 12px 14px;
      border-radius: 20px;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 16px;
      line-height: 1.45;
      box-shadow: var(--shadow);
      animation: fadeIn .18s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .msg.user {
      align-self: flex-end;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fff;
      border-bottom-right-radius: 8px;
    }

    .msg.assistant {
      align-self: flex-start;
      background: var(--glass);
      border: 1px solid var(--line);
      color: var(--text);
      border-bottom-left-radius: 8px;
      -webkit-backdrop-filter: blur(18px) saturate(160%);
      backdrop-filter: blur(18px) saturate(160%);
    }

    .msg.temp {
      opacity: 0.82;
    }

    .msg.error {
      border-color: rgba(255, 107, 129, 0.45);
      color: #ffd8df;
    }

    .composer-wrap {
      padding:
        10px
        12px
        calc(10px + env(safe-area-inset-bottom))
        12px;
      background: var(--glass-strong);
      border-top: 1px solid var(--line);
      -webkit-backdrop-filter: blur(22px) saturate(180%);
      backdrop-filter: blur(22px) saturate(180%);
    }

    .composer {
      display: flex;
      align-items: flex-end;
      gap: 10px;
    }

    .input {
      flex: 1;
      min-height: 48px;
      max-height: 140px;
      resize: none;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      border-radius: 18px;
      padding: 12px 14px;
      font-size: 16px;
      line-height: 1.4;
      outline: none;
      box-shadow: var(--shadow);
      -webkit-appearance: none;
      appearance: none;
      -webkit-backdrop-filter: blur(14px);
      backdrop-filter: blur(14px);
    }

    .input::placeholder {
      color: #7f8796;
    }

    .input:focus {
      border-color: rgba(139, 92, 246, 0.45);
    }

    .send-btn {
      width: 48px;
      height: 48px;
      flex: 0 0 48px;
      border: none;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      box-shadow: var(--shadow);
    }

    .send-btn:disabled {
      opacity: 0.6;
    }

    .hint {
      margin-top: 8px;
      padding: 0 4px;
      font-size: 12px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="title">Айя</div>
        <div class="status" id="status">На связи</div>
      </div>
      <button class="ghost-btn" id="clearBtn">Очистить</button>
    </header>

    <main class="chat" id="chat"></main>

    <div class="composer-wrap">
      <div class="composer">
        <textarea
          id="input"
          class="input"
          rows="1"
          placeholder="Напиши Айе..."
          enterkeyhint="send"
        ></textarea>
        <button id="sendBtn" class="send-btn">↑</button>
      </div>
      <div class="hint">Enter — отправить, Shift+Enter — новая строка</div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "aia_chat_v4";

    const chatEl = document.getElementById("chat");
    const inputEl = document.getElementById("input");
    const sendBtn = document.getElementById("sendBtn");
    const clearBtn = document.getElementById("clearBtn");
    const statusEl = document.getElementById("status");

    let chatHistory = [];

    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      chatHistory = saved ? JSON.parse(saved) : [];
      if (!Array.isArray(chatHistory)) chatHistory = [];
    } catch {
      chatHistory = [];
    }

    function saveHistory() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(chatHistory));
    }

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function scrollToBottom() {
      requestAnimationFrame(() => {
        chatEl.scrollTop = chatEl.scrollHeight;
      });
    }

    function autoResize() {
      inputEl.style.height = "48px";
      inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + "px";
    }

    function addMessage(role, text, options = {}) {
      const div = document.createElement("div");
      div.className = [
        "msg",
        role,
        options.temp ? "temp" : "",
        options.error ? "error" : ""
      ].join(" ").trim();

      div.textContent = text;
      chatEl.appendChild(div);
      scrollToBottom();
      return div;
    }

    function renderHistory() {
      chatEl.innerHTML = "";

      if (!chatHistory.length) {
        addMessage(
          "assistant",
          "Я здесь. Пиши нормально — и я отвечу нормально.",
          { temp: true }
        );
        return;
      }

      for (const item of chatHistory) {
        if (!item || !item.role || !item.content) continue;
        addMessage(item.role, item.content);
      }
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text || sendBtn.disabled) return;

      addMessage("user", text);
      chatHistory.push({ role: "user", content: text });
      saveHistory();

      inputEl.value = "";
      autoResize();
      sendBtn.disabled = true;
      setStatus("Думаю...");

        const
