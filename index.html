<style>
  /* ============================================================
     БАЗОВЫЕ СТИЛИ — СВЕТЛЕЕ ФОН + GLASSМОРФИЗМ
  ============================================================ */

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    padding: 0;
    font-family: "Inter", "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #f4f7ff 0%, #e3e9ff 100%);   /* ← светлее фон */
    color: #1f1f2e;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ============================================================
     ВЕРХНЯЯ ПАНЕЛЬ — СТЕКЛО (макс. прозрачность + размытие)
  ============================================================ */

  header {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    z-index: 1000;

    /* стекло */
    background: rgba(255, 255, 255, 0.25);        /* очень прозрачно */
    backdrop-filter: blur(16px);                  /* сильное размытие */
    -webkit-backdrop-filter: blur(16px);

    border-bottom: 1px solid rgba(255, 255, 255, 0.35);   /* тонкая белая обводка */
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);

    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 28px;
  }

  header h1 {
    margin: 0;
    font-size: 1.4rem;
    font-weight: 700;
    color: #0f1a3f;
  }

  /* ============================================================
     ОСНОВНОЙ КОНТЕЙНЕР ЧАТА
  ============================================================ */

  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    max-width: 900px;
    margin: 80px auto 160px auto;   /* отступ под header и под input-area снизу */
    padding: 20px;
  }

  /* Контейнер сообщений */
  #chat-container {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 14px;
    padding: 10px;
  }

  /* ============================================================
     СТЕКЛО-БОКСЫ СООБЩЕНИЙ (макс. прозрачность)
  ============================================================ */

  .message {
    max-width: 75%;
    padding: 14px 18px;
    border-radius: 14px;
    line-height: 1.5;
    font-size: 0.95rem;

    /* стекло — максимально прозрачный */
    background: rgba(255, 255, 255, 0.18);       /* очень прозрачно */
    backdrop-filter: blur(12px);                  /* сильное размытие */
    -webkit-backdrop-filter: blur(12px);

    border: 1px solid rgba(255, 255, 255, 0.4);    /* тонкая белая обводка */
    box-shadow: 0 6px 18px rgba(0, 0, 0, 0.05);

    /* выравнивание: user — справа, ai — слева */
    align-self: flex-start;
  }

  .message.user {
    align-self: flex-end;
    border-bottom-right-radius: 4px;           /* скругляем угол у пользователя */
  }

  .message.ai {
    align-self: flex-start;
    border-bottom-left-radius: 4px;             /* скругляем угол у AI */
  }

  .message .meta {
    font-size: 0.75rem;
    color: #6b7280;
    margin-top: 4px;
  }

  /* ============================================================
     НИЖНЯЯ ПАНЕЛЬ — ВВОД СООБЩЕНИЯ (СТЕКЛО)
  ============================================================ */

  #input-area {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    z-index: 1000;

    /* стекло */
    background: rgba(255, 255, 255, 0.22);        /* очень прозрачно */
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);

    border-top: 1px solid rgba(255, 255, 255, 0.35);
    box-shadow: 0 -4px 24px rgba(0, 0, 0, 0.08);

    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 20px;
  }

  #input-area form {
    display: flex;
    flex: 1;
    gap: 10px;
  }

  #user-input {
    flex: 1;
    padding: 12px 16px;
    border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, 0.5);
    background: rgba(255, 255, 255, 0.25);         /* стекло внутри поля */
    backdrop-filter: blur(6px);
    font-size: 0.95rem;
    outline: none;
    transition: 0.2s;
  }

  #user-input:focus {
    background: rgba(255, 255, 255, 0.35);
    border-color: rgba(255, 255, 255, 0.8);
  }

  #send-btn {
    padding: 10px 18px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, #4f6ef7, #3a56e4);
    color: #fff;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
  }

  #send-btn:hover {
    background: linear-gradient(135deg, #5a7eff, #4a60ef);
    transform: translateY(-1px);
  }

  /* скроллбар — красивый, нежный */
  #chat-container::-webkit-scrollbar {
    width: 8px;
  }
  #chat-container::-webkit-scrollbar-thumb {
    background: rgba(155, 166, 200, 0.4);
    border-radius: 4px;
  }
</style>
