<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aia — Glass Chat</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: "Inter", "Segoe UI", sans-serif;
    height: 100vh;
    background: #1a1a2e; /* чуть светлее, тёмно-синий — не бело, не чёрно */
    color: #e6e6ff;
    overflow: hidden;
  }

  /* ===== КОНТЕЙНЕР ===== */
  .app {
    height: 100vh;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  /* ===== СТЕКЛЯННЫЙ СВЕРХУ СЛОЙ (header) ===== */
  .header {
    background: rgba(255, 255, 255, 0.08); /* очень прозрачный */
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid rgba(255, 255, 255, 0.12);
    padding: 16px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .header h1 {
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  /* ===== СТЕКЛЯННАЯ ОБЛАСТЬ ЧАТА ===== */
  .chat {
    flex: 1;
    overflow-y: auto;
    padding: 28px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  /* ===== СТЕКЛЯННЫЕ БОКСЫ ДИАЛОГА ===== */
  .message {
    max-width: 70%;
    padding: 14px 18px;
    border-radius: 16px;
    line-height: 1.5;
    font-size: 15px;

    /* Стекло: полупрозрачный + размытие + тонкая граница */
    background: rgba(255, 255, 255, 0.10);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.18);
    box-shadow: 0 6px 20px rgba(0, 0, 0, 0.25);
  }

  .message.user {
    align-self: flex-end;
    background: rgba(100, 110, 255, 0.18);
    border: 1px solid rgba(150, 160, 255, 0.25);
    border-radius: 16px 16px 4px 16px;
  }

  .message.ai {
    align-self: flex-start;
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 16px 16px 16px 4px;
  }

  /* ===== СТЕКЛЯННЫЙ СНИЗУ СЛОЙ (ввод) ===== */
  .footer {
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-top: 1px solid rgba(255, 255, 255, 0.12);
    padding: 16px 28px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .footer input {
    flex: 1;
    background: rgba(255, 255, 255, 0.10);
    border: 1px solid rgba(255, 255, 255, 0.15);
    color: #f0f0ff;
    border-radius: 12px;
    padding: 12px 18px;
    font-size: 15px;
  }

  .footer input:focus {
    outline: none;
    border-color: rgba(150, 160, 255, 0.5);
    box-shadow: 0 0 0 3px rgba(100, 110, 255, 0.15);
  }

  .footer button {
    background: rgba(100, 110, 255, 0.25);
    color: #f0f0ff;
    border: none;
    border-radius: 12px;
    padding: 0 22px;
    font-weight: 600;
    cursor: pointer;
  }

  .footer button:hover {
    background: rgba(120, 130, 255, 0.35);
  }

  /* скроллбар */
  .chat::-webkit-scrollbar {
    width: 6px;
  }
  .chat::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.15);
    border-radius: 10px;
  }
</style>
</head>
<body>
  <div class="app">
    <!-- СТЕКЛЯННЫЙ СВЕРХУ СЛОЙ -->
    <header class="header">
      <h1>Aia</h1>
    </header>

    <!-- СТЕКЛЯННАЯ ОБЛАСТЬ ЧАТА -->
    <div class="chat" id="chat">
      <div class="message ai">Привет! Я Aia — чем могу помочь сегодня?</div>
      <div class="message user">Покажи, как работает стекло 😄</div>
    </div>

    <!-- СТЕКЛЯННЫЙ СНИЗУ СЛОЙ -->
    <div class="footer">
      <input id="userText" placeholder="Напиши сообщение..." onkeypress="if(event.key==='Enter') send()">
      <button onclick="send()">Отправить</button>
    </div>
  </div>

  <script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('userText');

    function send() {
      const text = input.value.trim();
      if (!text) return;

      // сообщение пользователя
      const userMsg = document.createElement('div');
      userMsg.className = 'message user';
      userMsg.textContent = text;
      chat.appendChild(userMsg);

      // ответ AI (заглушка)
      const aiMsg = document.createElement('div');
      aiMsg.className = 'message ai';
      aiMsg.textContent = "Понял! Стекло работает идеально ✨";
      chat.appendChild(aiMsg);

      input.value = '';
      chat.scrollTop = chat.scrollHeight;
    }
  </script>
</body>
</html>
