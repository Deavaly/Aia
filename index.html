<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>AIA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <style>
    :root {
      --bg: #050508;
      --accent: #8b5cf6;
      --glass: rgba(255, 255, 255, 0.05);
    }
    body, html { 
      margin: 0; padding: 0; height: 100dvh; 
      background: var(--bg); color: white;
      font-family: -apple-system, system-ui, sans-serif;
      overflow: hidden;
    }
    .app {
      display: flex; flex-direction: column; height: 100dvh;
      background: radial-gradient(circle at 50% -20%, #2e1065, transparent), var(--bg);
    }
    .header {
      padding: env(safe-area-inset-top) 20px 15px;
      display: flex; justify-content: space-between; align-items: center;
      background: rgba(0,0,0,0.5); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-bottom: 0.5px solid rgba(255,255,255,0.1);
    }
    .chat {
      flex: 1; overflow-y: auto; padding: 20px;
      display: flex; flex-direction: column; gap: 12px;
    }
    .msg {
      max-width: 85%; padding: 12px 16px; border-radius: 20px; font-size: 16px; line-height: 1.4;
    }
    .user { align-self: flex-end; background: var(--accent); border-bottom-right-radius: 4px; }
    .aia { align-self: flex-start; background: var(--glass); border: 0.5px solid rgba(255,255,255,0.1); border-bottom-left-radius: 4px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
    
    .input-area {
      padding: 10px 15px calc(20px + env(safe-area-inset-bottom));
      background: rgba(0,0,0,0.5); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-top: 0.5px solid rgba(255,255,255,0.1);
    }
    .input-row {
      display: flex; gap: 10px; background: rgba(255,255,255,0.05);
      padding: 8px 8px 8px 16px; border-radius: 25px; border: 0.5px solid rgba(255,255,255,0.1);
    }
    input { flex: 1; background: none; border: none; color: white; font-size: 16px; outline: none; }
    .send-btn { width: 40px; height: 40px; border-radius: 50%; background: white; border: none; color: black; font-size: 20px; }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div style="font-weight:700; font-size:20px;">Айя</div>
      <button onclick="localStorage.removeItem('aia_v2'); location.reload();" style="background:none; border:none; color:rgba(255,255,255,0.3); font-size:12px;">Очистить</button>
    </div>
    <div class="chat" id="box"></div>
    <div class="input-area">
      <div class="input-row">
        <input type="text" id="ui" placeholder="Напиши Айе..." onkeypress="if(event.key==='Enter')send()">
        <button id="btn" class="send-btn" onclick="send()">↑</button>
      </div>
    </div>
  </div>

  <script>
    const box = document.getElementById('box');
    const ui = document.getElementById('ui');
    let h = JSON.parse(localStorage.getItem('aia_v2') || '[]');

    function add(role, txt) {
      const div = document.createElement('div');
      div.className = `msg ${role==='user'?'user':'aia'}`;
      div.textContent = txt;
      box.appendChild(div);
      box.scrollTop = box.scrollHeight;
    }

    h.forEach(m => add(m.role, m.content));

    async function send() {
      const v = ui.value.trim(); if(!v) return;
      ui.value = ''; add('user', v);
      h.push({role:'user', content:v});
      
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({messages: h.slice(-10)})
      });
      const d = await res.json();
      if(d.reply) {
        add('aia', d.reply);
        h.push({role:'assistant', content:d.reply});
        localStorage.setItem('aia_v2', JSON.stringify(h));
      }
    }
  </script>
</body>
</html>
