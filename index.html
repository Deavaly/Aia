<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>AIA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b0b0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="https://picsum.photos/id/1015/512/512">

  <style>
    :root {
      --bg: #0b0b0f;
      --panel: #161924;
      --accent: #8b5cf6;
      --text: #f0f0f5;
      --muted: #9ba3b5;
    }
    * { box-sizing: border-box; margin:0; padding:0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      height: 100dvh;
      overflow: hidden;
      background: radial-gradient(circle at top, rgba(139,92,246,0.15), transparent 50%), var(--bg);
    }
    .app { height: 100dvh; display: grid; grid-template-rows: auto 1fr auto; }
    .topbar {
      padding: 50px 16px 12px;
      background: rgba(11,11,15,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .title { font-size: 22px; font-weight: 700; }
    .status { font-size: 13px; color: var(--muted); }
    .chat {
      padding: 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .msg {
      max-width: 82%;
      padding: 13px 16px;
      border-radius: 18px;
      font-size: 16.2px;
      line-height: 1.45;
    }
    .msg.user {
      align-self: flex-end;
      background: linear-gradient(135deg, #8b5cf6, #4f46e5);
      color: white;
      border-bottom-right-radius: 6px;
    }
    .msg.assistant {
      align-self: flex-start;
      background: var(--panel);
      border: 1px solid rgba(255,255,255,0.1);
      border-bottom-left-radius: 6px;
    }
    .composer {
      padding: 12px 12px 30px;
      background: rgba(11,11,15,0.9);
      backdrop-filter: blur(12px);
      border-top: 1px solid rgba(255,255,255,0.08);
    }
    .input-area {
      display: flex;
      gap: 8px;
    }
    .input {
      flex: 1;
      background: #1f2333;
      border: 1px solid #333;
      border-radius: 16px;
      padding: 14px 16px;
      color: white;
      font-size: 16px;
      min-height: 50px;
      max-height: 160px;
      resize: none;
    }
    .send {
      width: 50px;
      height: 50px;
      border-radius: 16px;
      background: linear-gradient(135deg, #8b5cf6, #4f46e5);
      border: none;
      color: white;
      font-size: 22px;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div>
        <div class="title">Айя</div>
        <div class="status" id="status">на связи</div>
      </div>
      <button id="clearBtn" style="padding:8px 14px; background:#222; color:#ddd; border:none; border-radius:10px;">Очистить</button>
    </div>

    <div class="chat" id="chat"></div>

    <div class="composer">
      <div class="input-area">
        <textarea id="input" class="input" placeholder="Напиши Айе..."></textarea>
        <button id="sendBtn" class="send">↑</button>
      </div>
    </div>
  </div>

  <script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');
    const clearBtn = document.getElementById('clearBtn');
    const status = document.getElementById('status');

    let history = JSON.parse(localStorage.getItem('aia_history') || '[]');

    function addMessage(role, content, isError = false) {
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      if (isError) div.style.border = '1px solid #ff5d73';
      div.textContent = content;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function renderHistory() {
      chat.innerHTML = '';
      if (history.length === 0) {
        addMessage('assistant', 'Привет. Я Айя.\nГовори со мной как с живой.', true);
      } else {
        history.forEach(msg => addMessage(msg.role, msg.content));
      }
    }

    async function send() {
      const text = input.value.trim();
      if (!text) return;

      addMessage('user', text);
      history.push({role: 'user', content: text});
      localStorage.setItem('aia_history', JSON.stringify(history));

      input.value = '';
      sendBtn.disabled = true;
      status.textContent = 'думает...';

      const tempMsg = document.createElement('div');
      tempMsg.className = 'msg assistant';
      tempMsg.textContent = 'Айя думает...';
      chat.appendChild(tempMsg);
      chat.scrollTop = chat.scrollHeight;

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ messages: history.slice(-16) })
        });

        const data = await res.json();

        tempMsg.remove();

        if (!res.ok) throw new Error(data.error || 'Ошибка сервера');

        const reply = data.reply || 'Не смогла ответить...';
        addMessage('assistant', reply);
        history.push({role: 'assistant', content: reply});
        localStorage.setItem('aia_history', JSON.stringify(history));
        status.textContent = 'на связи';
      } catch (e) {
        tempMsg.remove();
        addMessage('assistant', 'Ошибка связи: ' + e.message, true);
        status.textContent = 'ошибка';
      } finally {
        sendBtn.disabled = false;
      }
    }

    sendBtn.addEventListener('click', send);
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });

    clearBtn.addEventListener('click', () => {
      if (confirm('Очистить всю переписку?')) {
        history = [];
        localStorage.removeItem('aia_history');
        renderHistory();
      }
    });

    renderHistory();
  </script>
</body>
</html>
