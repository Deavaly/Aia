<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>AIA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/IMG_3917.jpeg">

  <style>
    :root {
      --text: #ffffff;
      --header-h: 70px;
      --input-h: 80px;
    }
    * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
    body, html { 
      margin: 0; padding: 0; height: 100%; 
      color: var(--text);
      font-family: -apple-system, system-ui, sans-serif;
      overflow: hidden;
      background: #0a0a12;
    }

    .app {
      position: relative; height: 100dvh;
      overflow: hidden;
    }

    /* ═══ Яркие цветные пятна ═══ */
    .bg {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      z-index: 0;
      background: #0a0a12;
    }
    .bg::before {
      content: '';
      position: absolute;
      width: 420px; height: 420px;
      top: -100px; left: -80px;
      border-radius: 50%;
      background: rgba(139, 92, 246, 0.5);
      filter: blur(100px);
    }
    .bg::after {
      content: '';
      position: absolute;
      width: 380px; height: 380px;
      bottom: -80px; right: -80px;
      border-radius: 50%;
      background: rgba(59, 130, 246, 0.4);
      filter: blur(100px);
    }
    .bg-extra1 {
      position: fixed;
      width: 300px; height: 300px;
      top: 45%; left: 50%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: rgba(168, 85, 247, 0.25);
      filter: blur(100px);
      z-index: 0;
    }
    .bg-extra2 {
      position: fixed;
      width: 250px; height: 250px;
      top: 20%; right: -40px;
      border-radius: 50%;
      background: rgba(236, 72, 153, 0.2);
      filter: blur(90px);
      z-index: 0;
    }
    .bg-extra3 {
      position: fixed;
      width: 280px; height: 280px;
      bottom: 15%; left: -40px;
      border-radius: 50%;
      background: rgba(99, 102, 241, 0.25);
      filter: blur(90px);
      z-index: 0;
    }

    /* ═══ Header — максимальная прозрачность ═══ */
    .header {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 10;
      padding: env(safe-area-inset-top) 20px 15px;
      height: var(--header-h);
      display: flex; justify-content: space-between; align-items: center;
      background: rgba(10, 10, 18, 0.3);
      backdrop-filter: blur(20px) saturate(180%) brightness(1.15);
      -webkit-backdrop-filter: blur(20px) saturate(180%) brightness(1.15);
      border-bottom: 0.5px solid rgba(255,255,255,0.08);
    }
    .status-group { display: flex; flex-direction: column; }
    .name { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
    .status { font-size: 11px; color: #a78bfa; text-transform: uppercase; letter-spacing: 1px; }

    /* ═══ Chat ═══ */
    .chat {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 1;
      overflow-y: auto;
      padding: calc(var(--header-h) + 15px) 20px calc(var(--input-h) + 15px) 20px;
      display: flex; flex-direction: column; gap: 18px;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }

    /* ═══ Messages ═══ */
    .msg {
      max-width: 82%; padding: 15px 19px; border-radius: 20px;
      font-size: 17px; line-height: 1.45; position: relative;
      animation: fadeIn 0.3s ease;
      flex-shrink: 0;
    }
    @keyframes fadeIn { 
      from { opacity: 0; transform: translateY(12px); } 
      to { opacity: 1; transform: translateY(0); } 
    }

    .user {
      align-self: flex-end;
      background: rgba(139, 92, 246, 0.2);
      backdrop-filter: blur(40px) saturate(180%) brightness(1.1);
      -webkit-backdrop-filter: blur(40px) saturate(180%) brightness(1.1);
      border: 1px solid rgba(168, 85, 247, 0.3);
      border-bottom-right-radius: 6px;
      color: white;
      box-shadow: 
        0 8px 32px rgba(0, 0, 0, 0.35),
        inset 0 1px 0 rgba(255, 255, 255, 0.15);
    }

    .aia {
      align-self: flex-start;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(40px) saturate(180%) brightness(1.1);
      -webkit-backdrop-filter: blur(40px) saturate(180%) brightness(1.1);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-bottom-left-radius: 6px;
      box-shadow: 
        0 8px 32px rgba(0, 0, 0, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.15);
    }

    /* ═══ Input Area — максимальная прозрачность ═══ */
    .input-area {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      z-index: 10;
      padding: 15px 15px calc(15px + env(safe-area-inset-bottom));
      height: var(--input-h);
      background: rgba(10, 10, 18, 0.3);
      backdrop-filter: blur(20px) saturate(180%) brightness(1.15);
      -webkit-backdrop-filter: blur(20px) saturate(180%) brightness(1.15);
      border-top: 0.5px solid rgba(255,255,255,0.08);
    }
    .input-row {
      display: flex; gap: 10px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      padding: 9px 9px 9px 18px; border-radius: 26px;
      border: 1px solid rgba(255, 255, 255, 0.15);
    }
    input {
      flex: 1; background: none; border: none; color: white;
      font-size: 17px; outline: none;
    }
    input::placeholder { color: rgba(255, 255, 255, 0.35); }
    .send-btn {
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(255, 255, 255, 0.95);
      border: none; color: black;
      font-size: 22px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.1s ease;
    }
    .send-btn:active { transform: scale(0.9); }
    .send-btn:disabled { opacity: 0.3; }
  </style>
</head>
<body>

  <div class="bg"></div>
  <div class="bg-extra1"></div>
  <div class="bg-extra2"></div>
  <div class="bg-extra3"></div>

  <div class="app">
    <div class="header">
      <div class="status-group">
        <span class="name">Айя</span>
        <span id="st" class="status">В сети</span>
      </div>
      <button onclick="clearChat()" style="background:none; border:none; color:rgba(255,255,255,0.4); font-size:13px;">Очистить</button>
    </div>
    
    <div class="chat" id="box"></div>

    <div class="input-area">
      <div class="input-row">
        <input type="text" id="ui" placeholder="Начни историю..." onkeypress="if(event.key==='Enter')send()">
        <button id="btn" class="send-btn" onclick="send()">↑</button>
      </div>
    </div>
  </div>

  <script>
    const box = document.getElementById('box');
    const ui = document.getElementById('ui');
    const st = document.getElementById('st');
    let h = JSON.parse(localStorage.getItem('aia_v2') || '[]');

    function add(role, txt) {
      const div = document.createElement('div');
      div.className = `msg ${role==='user'?'user':'aia'}`;
      div.textContent = txt;
      box.appendChild(div);
      box.scrollTop = box.scrollHeight;
    }

    h.forEach(m => add(m.role, m.content));
    if(!h.length) add('aia', 'Я здесь. Спрашивай о чем угодно, я не кусаюсь... почти.');

    async function send() {
      const v = ui.value.trim(); if(!v) return;
      ui.value = ''; add('user', v);
      h.push({role:'user', content:v});
      st.textContent = 'Айя думает...';
      
      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({messages: h.slice(-10)})
        });
        const d = await res.json();
        if(d.reply) {
          add('aia', d.reply);
          h.push({role:'assistant', content:d.reply});
          localStorage.setItem('aia_v2', JSON.stringify(h));
        }
      } catch(e) { add('aia', 'Связь прервалась...'); }
      st.textContent = 'В сети';
    }

    function clearChat() {
      localStorage.removeItem('aia_v2');
      location.reload();
    }
  </script>
</body>
</html>
