<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>AIA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/AIA-project/assets/main/icon.png">

  <style>
    :root {
      --bg: #08080c;
      --accent: #a855f7;
      --text: #ffffff;
      --glass: rgba(255, 255, 255, 0.05);
    }
    * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
    body, html { 
      margin: 0; padding: 0; height: 100%; 
      background: var(--bg); color: var(--text);
      font-family: -apple-system, system-ui, sans-serif;
      overflow: hidden;
    }
    .app {
      display: flex; flex-direction: column; height: 100dvh;
      background: radial-gradient(circle at 50% -20%, #2e1065, transparent);
    }
    .header {
      padding: env(safe-area-inset-top) 20px 15px;
      display: flex; justify-content: space-between; align-items: center;
      background: rgba(8, 8, 12, 0.5); backdrop-filter: blur(20px);
      border-bottom: 0.5px solid rgba(255,255,255,0.1);
      z-index: 10;
    }
    .status-group { display: flex; flex-direction: column; }
    .name { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
    .status { font-size: 11px; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
    
    .chat {
      flex: 1; overflow-y: auto; padding: 20px;
      display: flex; flex-direction: column; gap: 16px;
      scroll-behavior: smooth;
    }
    .msg {
      max-width: 85%; padding: 14px 18px; border-radius: 22px;
      font-size: 17px; line-height: 1.4; position: relative;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    .user {
      align-self: flex-end; background: var(--accent);
      color: white; border-bottom-right-radius: 4px;
      box-shadow: 0 4px 15px rgba(168, 85, 247, 0.3);
    }
    .aia {
      align-self: flex-start; background: var(--glass);
      border: 0.5px solid rgba(255,255,255,0.1);
      border-bottom-left-radius: 4px;
    }
    
    .input-area {
      padding: 15px 15px calc(15px + env(safe-area-inset-bottom));
      background: rgba(8, 8, 12, 0.8); backdrop-filter: blur(20px);
      border-top: 0.5px solid rgba(255,255,255,0.1);
    }
    .input-row {
      display: flex; gap: 10px; background: var(--glass);
      padding: 8px 8px 8px 16px; border-radius: 25px;
      border: 0.5px solid rgba(255,255,255,0.1);
    }
    input {
      flex: 1; background: none; border: none; color: white;
      font-size: 17px; outline: none;
    }
    .send-btn {
      width: 38px; height: 38px; border-radius: 50%;
      background: white; border: none; color: black;
      font-size: 20px; font-weight: bold;
    }
    .send-btn:disabled { opacity: 0.3; }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="status-group">
        <span class="name">Айя</span>
        <span id="st" class="status">В сети</span>
      </div>
      <button onclick="clearChat()" style="background:none; border:none; color:rgba(255,255,255,0.4); font-size:13px;">Очистить</button>
    </div>
    
    <div class="chat" id="box"></div>

    <div class="input-area">
      <div class="input-row">
        <input type="text" id="ui" placeholder="Начни историю..." onkeypress="if(event.key==='Enter')send()">
        <button id="btn" class="send-btn" onclick="send()">↑</button>
      </div>
    </div>
  </div>

    <script>
    const box = document.getElementById('box');
    const ui = document.getElementById('ui');
    const st = document.getElementById('st');
    let h = JSON.parse(localStorage.getItem('aia_v2') || '[]');

    function add(role, txt) {
      const div = document.createElement('div');
      div.className = `msg ${role==='user'?'user':'aia'}`;
      div.textContent = txt;
      box.appendChild(div);
      box.scrollTop = box.scrollHeight;
      return div;
    }

    h.forEach(m => add(m.role, m.content));

    async function send() {
      const v = ui.value.trim(); if(!v) return;
      ui.value = ''; 
      add('user', v);
      h.push({role:'user', content:v});
      
      st.textContent = 'Айя пишет...';
      const aiaDiv = add('aia', '...'); 
      
      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({messages: h.slice(-12)})
        });
        const d = await res.json();
        
        if(d.reply) {
          aiaDiv.textContent = d.reply; // Пока без потока, но быстро
          h.push({role:'assistant', content:d.reply});
          localStorage.setItem('aia_v2', JSON.stringify(h));
        }
      } catch(e) { aiaDiv.textContent = 'Связь прервалась...'; }
      st.textContent = 'В сети';
    }

    function clearChat() {
      if(confirm('Начать с чистого листа?')) {
        localStorage.removeItem('aia_v2');
        location.reload();
      }
    }
  </script>
</body>
</html>
