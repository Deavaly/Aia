<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>AIA</title>

  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0b12" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="AIA" />

  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icon.png" />

  <style>
    :root {
      --bg: #0b0b12;
      --bg-2: #10111a;
      --panel: rgba(255, 255, 255, 0.06);
      --panel-2: rgba(255, 255, 255, 0.08);
      --line: rgba(255, 255, 255, 0.10);
      --text: #f5f7ff;
      --muted: #9aa3b2;
      --accent: #8b5cf6;
      --accent-2: #5b6cff;
      --danger: #ff6a7a;
      --shadow: 0 20px 40px rgba(0,0,0,.35);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
    }

    body {
      min-height: 100dvh;
      overflow: hidden;
      background:
        radial-gradient(circle at top left, rgba(91,108,255,.20), transparent 32%),
        radial-gradient(circle at top right, rgba(139,92,246,.22), transparent 28%),
        radial-gradient(circle at bottom center, rgba(60,72,120,.16), transparent 35%),
        linear-gradient(180deg, #0a0b11 0%, #0d0f18 100%);
    }

    .app {
      height: 100dvh;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    .topbar {
      padding:
        calc(12px + env(safe-area-inset-top))
        14px
        12px
        14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: rgba(12, 13, 22, .55);
      backdrop-filter: blur(18px) saturate(160%);
      -webkit-backdrop-filter: blur(18px) saturate(160%);
      border-bottom: 1px solid var(--line);
    }

    .brand {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .title {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: .2px;
    }

    .status {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .ghost-btn {
      appearance: none;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.04);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 14px;
      font-size: 13px;
      font-weight: 600;
    }

    .chat {
      overflow-y: auto;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scroll-behavior: smooth;
    }

    .msg {
      max-width: 84%;
      padding: 12px 14px;
      border-radius: 18px;
      line-height: 1.42;
      font-size: 16px;
      white-space: pre-wrap;
      word-break: break-word;
      box-shadow: var(--shadow);
      animation: fadeIn .16s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .msg.user {
      align-self: flex-end;
      color: white;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border-bottom-right-radius: 8px;
    }

    .msg.assistant {
      align-self: flex-start;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.10);
      backdrop-filter: blur(14px) saturate(140%);
      -webkit-backdrop-filter: blur(14px) saturate(140%);
      border-bottom-left-radius: 8px;
    }

    .msg.temp {
      opacity: .82;
    }

    .msg.error {
      border-color: rgba(255,106,122,.35);
      color: #ffd8de;
    }

    .composer-wrap {
      padding:
        10px
        12px
        calc(10px + env(safe-area-inset-bottom))
        12px;
      background: rgba(12, 13, 22, .55);
      backdrop-filter: blur(18px) saturate(160%);
      -webkit-backdrop-filter: blur(18px) saturate(160%);
      border-top: 1px solid var(--line);
    }

    .composer {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .input {
      flex: 1;
      min-height: 48px;
      max-height: 140px;
      resize: none;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.06);
      color: var(--text);
      border-radius: 16px;
      padding: 12px 14px;
      font-size: 16px;
      line-height: 1.35;
      outline: none;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .input::placeholder {
      color: #7f8798;
    }

    .input:focus {
      border-color: rgba(139, 92, 246, .55);
      box-shadow: 0 0 0 3px rgba(139,92,246,.10);
    }

    .send-btn {
      width: 48px;
      height: 48px;
      flex: 0 0 48px;
      border: none;
      border-radius: 16px;
      color: white;
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: var(--shadow);
    }

    .send-btn:disabled {
      opacity: .55;
    }

    .hint {
      margin-top: 8px;
      padding: 0 4px;
      font-size: 12px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="title">Айя</div>
        <div class="status" id="status">на связи</div>
      </div>
      <button class="ghost-btn" id="clearBtn" type="button">Очистить</button>
    </header>

    <main class="chat" id="chat"></main>

    <div class="composer-wrap">
      <div class="composer">
        <textarea
          id="input"
          class="input"
          rows="1"
          placeholder="Напиши Айе..."
          enterkeyhint="send"
        ></textarea>
        <button id="sendBtn" class="send-btn" type="button">↑</button>
      </div>
      <div class="hint">Enter — отправить, Shift+Enter — новая строка</div>
    </div>
  </div>

  <script>
    (() => {
      const STORAGE_KEY = "aia_history_v3";

      const chat = document.getElementById("chat");
      const input = document.getElementById("input");
      const sendBtn = document.getElementById("sendBtn");
      const clearBtn = document.getElementById("clearBtn");
      const statusEl = document.getElementById("status");

      let history = [];

      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        history = saved ? JSON.parse(saved) : [];
        if (!Array.isArray(history)) history = [];
      } catch (e) {
        history = [];
      }

      function saveHistory() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
      }

      function setStatus(text) {
        statusEl.textContent = text;
      }

      function scrollToBottom() {
        requestAnimationFrame(() => {
          chat.scrollTop = chat.scrollHeight;
        });
      }

      function autoResize() {
        input.style.height = "48px";
        input.style.height = Math.min(input.scrollHeight, 140) + "px";
      }

      function addMessage(role, text, options = {}) {
        const el = document.createElement("div");
        el.className = `msg ${role}${options.temp ? " temp" : ""}${options.error ? " error" : ""}`;
        el.textContent = text;
        chat.appendChild(el);
        scrollToBottom();
        return el;
      }

      function renderHistory() {
        chat.innerHTML = "";
        if (!history.length) {
          addMessage("assistant", "Привет. Я Айя.\nТеперь давай без цирка и поломок — просто поговорим.", { temp: true });
          return;
        }

        for (const item of history) {
          if (!item || !item.role || !item.content) continue;
          addMessage(item.role, item.content);
        }
      }

      async function sendMessage() {
        const text = input.value.trim();
        if (!text || sendBtn.disabled) return;

        const userMessage = { role: "user", content: text };
        history.push(userMessage);
        saveHistory();
        addMessage("user", text);

        input.value = "";
        autoResize();
        sendBtn.disabled = true;
        setStatus("думаю...");

        const temp = addMessage("assistant", "…", { temp: true });

        try {
          const context = history.slice(-16);

          const res = await fetch("/api/chat", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({ messages: context })
          });

          const data = await res.json().catch(() => ({}));

          if (!res.ok) {
            throw new Error(
              data?.error?.message ||
              data?.error ||
              `HTTP ${res.status}`
            );
          }

          const reply = String(data?.reply || "Пустой ответ от модели.").trim();

          temp.remove();
          history.push({ role: "assistant", content: reply });
          saveHistory();
          addMessage("assistant", reply);
          setStatus("на связи");
        } catch (err) {
          temp.textContent = "Ошибка связи: " + (err.message || "неизвестно");
          temp.classList.add("error");
          temp.classList.remove("temp");
          setStatus("сбой связи");
          console.error(err);
        } finally {
          sendBtn.disabled = false;
          input.focus();
        }
      }

      clearBtn.addEventListener("click", () => {
        history = [];
        saveHistory();
        renderHistory();
        setStatus("память очищена");
      });

      sendBtn.addEventListener("click", sendMessage);

      input.addEventListener("input", autoResize);

      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });

      renderHistory();
      autoResize();
    })();
  </script>
</body>
</html>
