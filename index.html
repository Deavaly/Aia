<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>AIA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/IMG_3917.jpeg">
  <style>
    :root {
      --bg: #0e0e12;
      --accent: #a855f7;
      --text: #ffffff;
      --glass-bg: rgba(255, 255, 255, 0.08);
      --glass-border: rgba(255, 255, 255, 0.1);
      --user-bg: rgba(168, 85, 247, 0.3);
      --aia-bg: rgba(255, 255, 255, 0.06);
    }
    * {
      box-sizing: border-box;
      -webkit-font-smoothing: antialiased;
    }
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
    }
    .app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      background:
        linear-gradient(to bottom,
          rgba(139, 92, 246, 0.08) 0%,
          rgba(139, 92, 246, 0.03) 30%,
          transparent 100%);
    }
    .header {
      padding: env(safe-area-inset-top) 20px 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(30, 30, 40, 0.7);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border-bottom: 1px solid var(--glass-border);
    }
    .status-group {
      display: flex;
      flex-direction: column;
    }
    .name {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.5px;
    }
    .status {
      font-size: 11px;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
      background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><defs><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/></filter></defs><rect width="100" height="100" filter="url(%23noise)" opacity="0.03"/></svg>');
    }
    .msg {
      max-width: 85%;
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 16px;
      line-height: 1.45;
      position: relative;
      animation: fadeIn 0.3s ease;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .user {
      align-self: flex-end;
      background: var(--user-bg);
      color: white;
      border-bottom-right-radius: 6px;
      box-shadow:
        0 2px 8px rgba(168, 85, 247, 0.2),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }
    .aia {
      align-self: flex-start;
      background: var(--aia-bg);
      color: rgba(255, 255, 255, 0.9);
      border-bottom-left-radius: 6px;
      box-shadow:
        0 2px 8px rgba(0, 0, 0, 0.1),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }
    .input-area {
      padding: 15px 15px calc(15px + env(safe-area-inset-bottom));
      background: rgba(30, 30, 40, 0.7);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border-top: 1px solid var(--glass-border);
    }
    .input-row {
      display: flex;
      gap: 10px;
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 10px 12px 10px 16px;
      border-radius: 22px;
      border: 1px solid var(--glass-border);
    }
    input {
      flex: 1;
      background: none;
      border: none;
      color: white;
      font-size: 16px;
      outline: none;
    }
    input::placeholder {
      color: rgba(255, 255, 255, 0.4);
    }
    .send-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(12px);
      border: none;
      color: black;
      font-size: 18px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .send-btn:active {
      transform: scale(0.9);
      background: rgba(255, 255, 255, 0.7);
    }
    .send-btn:disabled {
      opacity: 0.4;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="status-group">
        <span class="name">Айя</span>
        <span id="st" class="status">В сети</span>
      </div>
      <button onclick="clearChat()" style="background:none; border:none; color:rgba(255,255,255,0.4); font-size:13px;">Очистить</button>
    </div>

    <div class="chat" id="box"></div>

    <div class="input-area">
      <div class="input-row">
        <input type="text" id="ui" placeholder="Напиши сообщение..." onkeypress="if(event.key==='Enter')send()">
        <button id="btn" class="send-btn" onclick="send()">↑</button>
      </div>
    </div>
  </div>

  <script>
    const box = document.getElementById('box');
    const ui = document.getElementById('ui');
    const st = document.getElementById('st');
    let h = JSON.parse(localStorage.getItem('aia_v2') || '[]');

    function add(role, txt) {
      const div = document.createElement('div');
      div.className = `msg ${role==='user'?'user':'aia'}`;
      div.textContent = txt;
      box.appendChild(div);
      box.scrollTop = box.scrollHeight;
    }

    h.forEach(m => add(m.role, m.content));
    if(!h.length) add('aia', 'Привет. О чём поговорим?');

    async function send() {
      const v = ui.value.trim();
      if(!v) return;

      ui.value = '';
      add('user', v);
      h.push({role:'user', content:v});
      st.textContent = 'Печатает...';

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({messages: h.slice(-10)})
        });
        const d = await res.json();
        if(d.reply) {
          add('aia', d.reply);
          h.push({role:'assistant', content:d.reply});
          localStorage.setItem('aia_v2', JSON.stringify(h));
        }
      } catch(e) {
        add('aia', 'Ошибка соединения. Попробуй ещё раз.');
      }
      st.textContent = 'В сети';
    }

    function clearChat() {
      localStorage.removeItem('aia_v2');
      location.reload();
    }
  </script>
</body>
</html>
