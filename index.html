<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aia</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(145deg, #0f0c1f 0%, #1a1733 100%);
      color: #e0dfff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ====================== HEADER ====================== */
    header {
      position: fixed;
      top: 0;
      width: 100%;
      padding: 16px 30px;
      background: rgba(20, 20, 45, 0.55);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      background: linear-gradient(90deg, #a5b4ff, #c8b4ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* ====================== ЧАТ ====================== */
    .chat-container {
      flex: 1;
      margin-top: 75px;
      margin-bottom: 85px;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 18px;
      scrollbar-width: thin;
      scrollbar-color: rgba(120, 110, 200, 0.3) transparent;
    }

    .message {
      max-width: 75%;
      padding: 15px 20px;
      border-radius: 18px;
      line-height: 1.5;
      font-size: 1.02rem;
      background: rgba(30, 30, 55, 0.65);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .message.user {
      align-self: flex-end;
      background: rgba(70, 60, 230, 0.75);
      border: 1px solid rgba(130, 120, 255, 0.3);
      border-bottom-right-radius: 5px;
    }

    .message.ai {
      align-self: flex-start;
      border-bottom-left-radius: 5px;
    }

    /* ====================== INPUT AREA ====================== */
    .input-area {
      position: fixed;
      bottom: 0;
      width: 100%;
      padding: 18px 25px;
      background: rgba(18, 18, 42, 0.75);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      border-top: 1px solid rgba(255, 255, 255, 0.09);
      z-index: 1000;
    }

    .input-wrapper {
      display: flex;
      gap: 12px;
      max-width: 900px;
      margin: 0 auto;
    }

    #user-input {
      flex: 1;
      padding: 16px 20px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(30, 30, 60, 0.6);
      color: #e0dfff;
      font-size: 1.05rem;
      outline: none;
    }

    #user-input:focus {
      border-color: rgba(140, 130, 255, 0.5);
      background: rgba(35, 35, 70, 0.8);
    }

    #send-btn {
      padding: 0 28px;
      background: linear-gradient(135deg, #4f46e5, #7c6eff);
      color: white;
      border: none;
      border-radius: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }

    #send-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(80, 70, 255, 0.3);
    }

    .chat-container::-webkit-scrollbar {
      width: 8px;
    }
    .chat-container::-webkit-scrollbar-thumb {
      background: rgba(130, 120, 200, 0.35);
      border-radius: 20px;
    }
  </style>
</head>
<body>

  <header>
    <h1>Aia</h1>
  </header>

  <div class="chat-container" id="chat-container">
    <!-- Сообщения будут добавляться сюда через JS -->
    <div class="message ai">
      Привет. Я Aia. Чем могу помочь сегодня?
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrapper">
      <input type="text" id="user-input" placeholder="Напишите сообщение..." autocomplete="off">
      <button id="send-btn">Отправить</button>
    </div>
  </div>

  <script>
    const chatContainer = document.getElementById('chat-container');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    function addMessage(text, type) {
      const msg = document.createElement('div');
      msg.className = `message ${type}`;
      msg.textContent = text;
      chatContainer.appendChild(msg);
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function sendMessage() {
      const text = userInput.value.trim();
      if (!text) return;

      addMessage(text, 'user');
      userInput.value = '';

      // Имитация ответа
      setTimeout(() => {
        addMessage("Я получила твоё сообщение. Это демо-версия.", 'ai');
      }, 800);
    }

    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });
  </script>

</body>
</html>
