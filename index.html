<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>AIA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon.png">

  <style>
    :root {
      --bg: #050508;
      --accent: #8b5cf6;
      --text: #ffffff;
      --glass: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.1);
    }
    * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
    body, html { 
      margin: 0; padding: 0; height: 100dvh; 
      background: var(--bg); color: var(--text);
      font-family: -apple-system, "SF Pro Text", sans-serif;
      overflow: hidden;
    }
    .app {
      display: flex; flex-direction: column; height: 100dvh;
      background: 
        radial-gradient(circle at 20% 20%, #1e1b4b 0%, transparent 40%),
        radial-gradient(circle at 80% 80%, #2e1065 0%, transparent 40%);
    }
    .header {
      padding: env(safe-area-inset-top) 20px 15px;
      display: flex; justify-content: space-between; align-items: center;
      background: rgba(5, 5, 8, 0.4); backdrop-filter: blur(30px);
      border-bottom: 0.5px solid var(--glass-border);
      z-index: 10;
    }
    .name { font-size: 19px; font-weight: 600; letter-spacing: -0.2px; }
    .status { font-size: 10px; color: var(--accent); text-transform: uppercase; letter-spacing: 1.5px; opacity: 0.8; }
    
    .chat {
      flex: 1; overflow-y: auto; padding: 15px;
      display: flex; flex-direction: column; gap: 12px;
    }
    .msg {
      max-width: 82%; padding: 12px 16px; border-radius: 20px;
      font-size: 16px; line-height: 1.45;
      animation: fadeIn 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    
    .user {
      align-self: flex-end; background: var(--accent);
      color: white; border-bottom-right-radius: 4px;
    }
    .aia {
      align-self: flex-start; background: var(--glass);
      border: 0.5px solid var(--glass-border);
      border-bottom-left-radius: 4px;
      backdrop-filter: blur(10px);
    }
    
    .input-area {
      padding: 10px 15px calc(15px + env(safe-area-inset-bottom));
      background: rgba(5, 5, 8, 0.6); backdrop-filter: blur(30px);
    }
    .input-row {
      display: flex; gap: 8px; background: var(--glass);
      padding: 6px 6px 6px 16px; border-radius: 24px;
      border: 0.5px solid var(--glass-border);
    }
    input {
      flex: 1; background: none; border: none; color: white;
      font-size: 16px; outline: none; padding: 8px 0;
    }
    .send-btn {
      width: 36px; height: 36px; border-radius: 18px;
      background: white; border: none; color: black;
      font-size: 18px; display: flex; align-items: center; justify-content: center;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="status-group">
        <span class="name">Айя</span>
        <span id="st" class="status">В сети</span>
      </div>
      <button onclick="clearChat()" style="background:none; border:none; color:rgba(255,255,255,0.4); font-size:13px;">Очистить</button>
    </div>
    
    <div class="chat" id="box"></div>

    <div class="input-area">
      <div class="input-row">
        <input type="text" id="ui" placeholder="Начни историю..." onkeypress="if(event.key==='Enter')send()">
        <button id="btn" class="send-btn" onclick="send()">↑</button>
      </div>
    </div>
  </div>

    <script>
    const box = document.getElementById('box');
    const ui = document.getElementById('ui');
    const st = document.getElementById('st');
    let h = JSON.parse(localStorage.getItem('aia_v2') || '[]');

    function add(role, txt) {
      const div = document.createElement('div');
      div.className = `msg ${role==='user'?'user':'aia'}`;
      div.textContent = txt;
      box.appendChild(div);
      box.scrollTop = box.scrollHeight;
      return div;
    }

    h.forEach(m => add(m.role, m.content));

    async function send() {
      const v = ui.value.trim(); if(!v) return;
      ui.value = ''; 
      add('user', v);
      h.push({role:'user', content:v});
      
      st.textContent = 'Айя пишет...';
      const aiaDiv = add('aia', '...'); 
      
      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({messages: h.slice(-12)})
        });
        const d = await res.json();
        
        if(d.reply) {
          aiaDiv.textContent = d.reply; // Пока без потока, но быстро
          h.push({role:'assistant', content:d.reply});
          localStorage.setItem('aia_v2', JSON.stringify(h));
        }
      } catch(e) { aiaDiv.textContent = 'Связь прервалась...'; }
      st.textContent = 'В сети';
    }

    function clearChat() {
      if(confirm('Начать с чистого листа?')) {
        localStorage.removeItem('aia_v2');
        location.reload();
      }
    }
  </script>
</body>
</html>
