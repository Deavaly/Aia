<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>AIA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style>
    :root { --accent: #7c3aed; }
    body, html { margin: 0; padding: 0; height: 100dvh; background: #000; color: #fff; font-family: -apple-system, system-ui, sans-serif; overflow: hidden; }
    
    /* Делаем фон очень заметным, чтобы Blur работал */
    .bg { position: fixed; inset: 0; z-index: -1; background: #050508; }
    .light { position: absolute; width: 400px; height: 400px; border-radius: 50%; filter: blur(80px); opacity: 0.4; }
    .l1 { top: -10%; left: -10%; background: #4f46e5; animation: m1 15s infinite alternate; }
    .l2 { bottom: -10%; right: -10%; background: #7c3aed; animation: m2 20s infinite alternate; }
    @keyframes m1 { from { transform: translate(0,0); } to { transform: translate(50vw, 20vh); } }
    @keyframes m2 { from { transform: translate(0,0); } to { transform: translate(-40vw, -30vh); } }

    .app { display: flex; flex-direction: column; height: 100dvh; }
    
    /* Хедер с сильным размытием */
    .header {
      padding: env(safe-area-inset-top) 20px 15px;
      display: flex; justify-content: space-between; align-items: center;
      background: rgba(10, 10, 15, 0.4); 
      backdrop-filter: blur(40px) saturate(180%); -webkit-backdrop-filter: blur(40px) saturate(180%);
      border-bottom: 0.5px solid rgba(255,255,255,0.15);
    }

    .chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
    .msg { max-width: 80%; padding: 12px 16px; border-radius: 20px; font-size: 16px; line-height: 1.4; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
    .user { align-self: flex-end; background: var(--accent); border-bottom-right-radius: 4px; }
    .aia { align-self: flex-start; background: rgba(255, 255, 255, 0.08); border: 0.5px solid rgba(255,255,255,0.1); border-bottom-left-radius: 4px; }

    .input-area {
      padding: 15px 15px calc(30px + env(safe-area-inset-bottom));
      background: rgba(10, 10, 15, 0.5);
      backdrop-filter: blur(40px) saturate(180%); -webkit-backdrop-filter: blur(40px) saturate(180%);
      border-top: 0.5px solid rgba(255,255,255,0.15);
    }
    .input-row { display: flex; gap: 10px; background: rgba(255,255,255,0.1); padding: 8px 8px 8px 16px; border-radius: 25px; border: 0.5px solid rgba(255,255,255,0.1); }
    input { flex: 1; background: none; border: none; color: #fff; font-size: 16px; outline: none; }
    .btn { width: 38px; height: 38px; border-radius: 50%; background: #fff; border: none; color: #000; font-size: 20px; font-weight: bold; }
  </style>
</head>
<body>
  <div class="bg"><div class="light l1"></div><div class="light l2"></div></div>
  <div class="app">
    <div class="header">
      <div style="font-weight:700; font-size:20px;">Айя</div>
      <button onclick="localStorage.clear(); location.reload();" style="background:none; border:none; color:rgba(255,255,255,0.5);">Очистить</button>
    </div>
    <div class="chat" id="box"></div>
    <div class="input-area">
      <div class="input-row">
        <input type="text" id="ui" placeholder="Напиши Айе..." onkeypress="if(event.key==='Enter')send()">
        <button id="btn" class="btn" onclick="send()">↑</button>
      </div>
    </div>
  </div>
  <script>
    const box = document.getElementById('box');
    const ui = document.getElementById('ui');
    let h = JSON.parse(localStorage.getItem('aia_v5') || '[]');
    function add(r, t) {
      const d = document.createElement('div'); d.className = `msg ${r==='user'?'user':'aia'}`;
      d.textContent = t; box.appendChild(d); box.scrollTop = box.scrollHeight;
    }
    h.forEach(m => add(m.role, m.content));
    async function send() {
      const v = ui.value.trim(); if(!v) return;
      ui.value = ''; add('user', v); h.push({role:'user', content:v});
      const res = await fetch('/api/chat', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({messages:h.slice(-10)}) });
      const d = await res.json();
      if(d.reply) { add('aia', d.reply); h.push({role:'assistant', content:d.reply}); localStorage.setItem('aia_v5', JSON.stringify(h)); }
    }
  </script>
</body>
</html>
