<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>AIA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/IMG_3917.jpeg">

<style>
  /* ============================================================
     БАЗОВЫЕ СТИЛИ — СВЕТЛЕЕ ФОН + GLASSМОРФИЗМ
  ============================================================ */

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    padding: 0;
    font-family: "Inter", "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #f4f7ff 0%, #e3e9ff 100%);   /* ← светлее фон */
    color: #1f1f2e;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ============================================================
     ВЕРХНЯЯ ПАНЕЛЬ — СТЕКЛО (макс. прозрачность + размытие)
  ============================================================ */

  header {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    z-index: 1000;

    /* стекло */
    background: rgba(255, 255, 255, 0.25);        /* очень прозрачно */
    backdrop-filter: blur(16px);                  /* сильное размытие */
    -webkit-backdrop-filter: blur(16px);

    border-bottom: 1px solid rgba(255, 255, 255, 0.35);   /* тонкая белая обводка */
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);

    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 28px;
  }

  header h1 {
    margin: 0;
    font-size: 1.4rem;
    font-weight: 700;
    color: #0f1a3f;
  }

  /* ============================================================
     ОСНОВНОЙ КОНТЕЙНЕР ЧАТА
  ============================================================ */

  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    max-width: 900px;
    margin: 80px auto 160px auto;   /* отступ под header и под input-area снизу */
    padding: 20px;
  }

  /* Контейнер сообщений */
  #chat-container {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 14px;
    padding: 10px;
  }

  /* ============================================================
     СТЕКЛО-БОКСЫ СООБЩЕНИЙ (макс. прозрачность)
  ============================================================ */

  .message {
    max-width: 75%;
    padding: 14px 18px;
    border-radius: 14px;
    line-height: 1.5;
    font-size: 0.95rem;

    /* стекло — максимально прозрачный */
    background: rgba(255, 255, 255, 0.18);       /* очень прозрачно */
    backdrop-filter: blur(12px);                  /* сильное размытие */
    -webkit-backdrop-filter: blur(12px);

    border: 1px solid rgba(255, 255, 255, 0.4);    /* тонкая белая обводка */
    box-shadow: 0 6px 18px rgba(0, 0, 0, 0.05);

    /* выравнивание: user — справа, ai — слева */
    align-self: flex-start;
  }

  .message.user {
    align-self: flex-end;
    border-bottom-right-radius: 4px;           /* скругляем угол у пользователя */
  }

  .message.ai {
    align-self: flex-start;
    border-bottom-left-radius: 4px;             /* скругляем угол у AI */
  }

  .message .meta {
    font-size: 0.75rem;
    color: #6b7280;
    margin-top: 4px;
  }

  /* ============================================================
     НИЖНЯЯ ПАНЕЛЬ — ВВОД СООБЩЕНИЯ (СТЕКЛО)
  ============================================================ */

  #input-area {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    z-index: 1000;

    /* стекло */
    background: rgba(255, 255, 255, 0.22);        /* очень прозрачно */
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);

    border-top: 1px solid rgba(255, 255, 255, 0.35);
    box-shadow: 0 -4px 24px rgba(0, 0, 0, 0.08);

    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 20px;
  }

  #input-area form {
    display: flex;
    flex: 1;
    gap: 10px;
  }

  #user-input {
    flex: 1;
    padding: 12px 16px;
    border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, 0.5);
    background: rgba(255, 255, 255, 0.25);         /* стекло внутри поля */
    backdrop-filter: blur(6px);
    font-size: 0.95rem;
    outline: none;
    transition: 0.2s;
  }

  #user-input:focus {
    background: rgba(255, 255, 255, 0.35);
    border-color: rgba(255, 255, 255, 0.8);
  }

  #send-btn {
    padding: 10px 18px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, #4f6ef7, #3a56e4);
    color: #fff;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
  }

  #send-btn:hover {
    background: linear-gradient(135deg, #5a7eff, #4a60ef);
    transform: translateY(-1px);
  }

  /* скроллбар — красивый, нежный */
  #chat-container::-webkit-scrollbar {
    width: 8px;
  }
  #chat-container::-webkit-scrollbar-thumb {
    background: rgba(155, 166, 200, 0.4);
    border-radius: 4px;
  }
</style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="status-group">
        <span class="name">Айя</span>
        <span id="st" class="status">В сети</span>
      </div>
      <button onclick="clearChat()" style="background:none; border:none; color:rgba(255,255,255,0.4); font-size:13px;">Очистить</button>
    </div>
    
    <div class="chat" id="box"></div>

    <div class="input-area">
      <div class="input-row">
        <input type="text" id="ui" placeholder="Начни историю..." onkeypress="if(event.key==='Enter')send()">
        <button id="btn" class="send-btn" onclick="send()">↑</button>
      </div>
    </div>
  </div>

  <script>
    const box = document.getElementById('box');
    const ui = document.getElementById('ui');
    const st = document.getElementById('st');
    let h = JSON.parse(localStorage.getItem('aia_v2') || '[]');

    function add(role, txt) {
      const div = document.createElement('div');
      div.className = `msg ${role==='user'?'user':'aia'}`;
      div.textContent = txt;
      box.appendChild(div);
      box.scrollTop = box.scrollHeight;
    }

    h.forEach(m => add(m.role, m.content));
    if(!h.length) add('aia', 'Я здесь. Спрашивай о чем угодно, я не кусаюсь... почти.');

    async function send() {
      const v = ui.value.trim(); if(!v) return;
      ui.value = ''; add('user', v);
      h.push({role:'user', content:v});
      st.textContent = 'Айя думает...';
      
      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({messages: h.slice(-10)})
        });
        const d = await res.json();
        if(d.reply) {
          add('aia', d.reply);
          h.push({role:'assistant', content:d.reply});
          localStorage.setItem('aia_v2', JSON.stringify(h));
        }
      } catch(e) { add('aia', 'Связь прервалась...'); }
      st.textContent = 'В сети';
    }

    function clearChat() {
      localStorage.removeItem('aia_v2');
      location.reload();
    }
  </script>
</body>
</html>
