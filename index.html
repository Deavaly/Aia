<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>AIA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/IMG_3917.jpeg">

<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: 'Inter', system-ui, sans-serif;
    background: linear-gradient(145deg, #0d0b1f 0%, #1a162e 100%); /* чуть светлее, чем обычно */
    color: #e0e0ff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ====================== HEADER (стекло) ====================== */
  header {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    z-index: 1000;
    padding: 16px 28px;
    background: rgba(15, 15, 35, 0.45);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(255, 255, 255, 0.07);
    box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
  }

  header h1 {
    margin: 0;
    font-size: 1.55rem;
    font-weight: 700;
    background: linear-gradient(90deg, #a0b0ff, #c0b0ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  /* ====================== ЧАТ ====================== */
  main {
    flex: 1;
    max-width: 920px;
    margin: 85px auto 120px;
    padding: 20px;
  }

  #chat-container {
    display: flex;
    flex-direction: column;
    gap: 16px;
    padding: 10px;
    overflow-y: auto;
    height: 100%;
  }

  /* ====================== СООБЩЕНИЯ (стекло) ====================== */
  .message {
    padding: 14px 18px;
    border-radius: 16px;
    line-height: 1.55;
    font-size: 0.97rem;
    max-width: 78%;

    /* Тёмное стекло */
    background: rgba(25, 28, 55, 0.52);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border: 1px solid rgba(255, 255, 255, 0.09);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
  }

  .message.user {
    align-self: flex-end;
    border-bottom-right-radius: 4px;
    background: rgba(80, 65, 255, 0.65);
    border: 1px solid rgba(140, 130, 255, 0.25);
  }

  .message.ai {
    align-self: flex-start;
    border-bottom-left-radius: 4px;
  }

  /* ====================== НИЖНЯЯ ПАНЕЛЬ (стекло) ====================== */
  #input-area {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    padding: 16px 24px;
    background: rgba(15, 15, 35, 0.55);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid rgba(255, 255, 255, 0.08);
    box-shadow: 0 -8px 30px rgba(0, 0, 0, 0.35);
    z-index: 1000;
  }

  #user-input {
    flex: 1;
    background: rgba(30, 30, 60, 0.6);
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: #e0e0ff;
    padding: 14px 18px;
    border-radius: 14px;
    font-size: 1rem;
    outline: none;
  }

  #user-input:focus {
    border-color: rgba(140, 130, 255, 0.4);
    background: rgba(35, 35, 70, 0.7);
  }

  #send-btn {
    padding: 0 24px;
    background: linear-gradient(135deg, #5041ff, #6e5fff);
    color: white;
    border: none;
    border-radius: 14px;
    font-weight: 600;
    cursor: pointer;
  }

  /* Скроллбар */
  #chat-container::-webkit-scrollbar {
    width: 6px;
  }
  #chat-container::-webkit-scrollbar-thumb {
    background: rgba(120, 110, 200, 0.3);
    border-radius: 20px;
  }
</style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="status-group">
        <span class="name">Айя</span>
        <span id="st" class="status">В сети</span>
      </div>
      <button onclick="clearChat()" style="background:none; border:none; color:rgba(255,255,255,0.4); font-size:13px;">Очистить</button>
    </div>
    
    <div class="chat" id="box"></div>

    <div class="input-area">
      <div class="input-row">
        <input type="text" id="ui" placeholder="Начни историю..." onkeypress="if(event.key==='Enter')send()">
        <button id="btn" class="send-btn" onclick="send()">↑</button>
      </div>
    </div>
  </div>

  <script>
    const box = document.getElementById('box');
    const ui = document.getElementById('ui');
    const st = document.getElementById('st');
    let h = JSON.parse(localStorage.getItem('aia_v2') || '[]');

    function add(role, txt) {
      const div = document.createElement('div');
      div.className = `msg ${role==='user'?'user':'aia'}`;
      div.textContent = txt;
      box.appendChild(div);
      box.scrollTop = box.scrollHeight;
    }

    h.forEach(m => add(m.role, m.content));
    if(!h.length) add('aia', 'Я здесь. Спрашивай о чем угодно, я не кусаюсь... почти.');

    async function send() {
      const v = ui.value.trim(); if(!v) return;
      ui.value = ''; add('user', v);
      h.push({role:'user', content:v});
      st.textContent = 'Айя думает...';
      
      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({messages: h.slice(-10)})
        });
        const d = await res.json();
        if(d.reply) {
          add('aia', d.reply);
          h.push({role:'assistant', content:d.reply});
          localStorage.setItem('aia_v2', JSON.stringify(h));
        }
      } catch(e) { add('aia', 'Связь прервалась...'); }
      st.textContent = 'В сети';
    }

    function clearChat() {
      localStorage.removeItem('aia_v2');
      location.reload();
    }
  </script>
</body>
</html>
